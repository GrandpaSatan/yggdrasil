<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zero-Shot Text Classifier</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: '#0f172a'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-950 text-white min-h-screen p-4">
  <div id="root"></div>

  <script>
    const { pipeline } = Transformers;
    const { useState, useEffect } = React;

    function App() {
      const [text, setText] = useState('');
      const [labels, setLabels] = useState(['Urgent', 'Idea', 'Technical', 'Personal']);
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        if (labels.length === 0) {
          setLabels(['Urgent', 'Idea', 'Technical', 'Personal']);
        }
      }, [labels]);

      const handleLabelChange = (index, value) => {
        const newLabels = [...labels];
        newLabels[index] = value;
        setLabels(newLabels);
      };

      const handleAddLabel = () => {
        setLabels([...labels, 'New Label']);
      };

      const handleRemoveLabel = (index) => {
        if (labels.length <= 1) return;
        const newLabels = [...labels];
        newLabels.splice(index, 1);
        setLabels(newLabels);
      };

      const classifyText = async () => {
        if (!text.trim() || labels.length === 0) return;

        setLoading(true);
        try {
          const classifier = await pipeline("zero-shot-classification", "Xenova/mobilebert-uncased-mnli");
          const result = await classifier(text, labels, { multi_label: true });
          setResults(result.scores.map((score, i) => ({
            label: result.labels[i],
            score: score
          })));
        } catch (error) {
          console.error("Classification error:", error);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-4xl mx-auto">
          <h1 className="text-3xl font-bold mb-6 text-center">Zero-Shot Text Classifier</h1>

          <div className="mb-6">
            <textarea
              value={text}
              onChange={(e) => setText(e.target.value)}
              placeholder="Enter your text here..."
              className="w-full p-4 bg-gray-800 rounded-lg border border-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              rows="4"
            />
          </div>

          <div className="mb-6">
            <h2 className="text-xl font-semibold mb-3">Labels</h2>
            {labels.map((label, index) => (
              <div key={index} className="flex items-center mb-2">
                <input
                  type="text"
                  value={label}
                  onChange={(e) => handleLabelChange(index, e.target.value)}
                  className="w-full p-2 bg-gray-800 rounded-lg border border-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                />
                <button
                  onClick={() => handleRemoveLabel(index)}
                  className="ml-2 p-2 bg-red-600 rounded-lg hover:bg-red-700 transition"
                >
                  Remove
                </button>
              </div>
            ))}
            <button
              onClick={handleAddLabel}
              className="mt-2 px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-700 transition"
            >
              Add Label
            </button>
          </div>

          <div className="flex justify-center mb-6">
            <button
              onClick={classifyText}
              disabled={loading || !text.trim()}
              className={`px-6 py-3 rounded-lg font-semibold transition ${
                loading || !text.trim()
                  ? 'bg-gray-700 cursor-not-allowed'
                  : 'bg-green-600 hover:bg-green-700'
              }`}
            >
              {loading ? 'Classifying...' : 'Classify Text'}
            </button>
          </div>

          {results.length > 0 && (
            <div className="mt-8">
              <h2 className="text-xl font-semibold mb-4">Classification Results</h2>
              <div className="space-y-4">
                {results
                  .filter(item => item.score > 0)
                  .sort((a, b) => b.score - a.score)
                  .map((item, index) => (
                    <div key={index} className="bg-gray-800 rounded-lg p-4">
                      <div className="flex justify-between mb-2">
                        <span className="font-medium">{item.label}</span>
                        <span className="text-sm">{(item.score * 100).toFixed(2)}%</span>
                      </div>
                      <div className="w-full bg-gray-700 rounded-full h-2.5">
                        <div
                          className="bg-blue-600 h-2.5 rounded-full"
                          style={{ width: `${item.score * 100}%` }}
                        ></div>
                      </div>
                    </div>
                  ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
