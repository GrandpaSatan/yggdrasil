<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Yggdrasil world-tree: trunk + 3 tiers of branches + roots -->
  <path d="M12 2v20" />
  <!-- Upper canopy (Asgard) -->
  <path d="M12 4c-2 0-3.5 1.2-3.5 2.8" />
  <path d="M12 4c2 0 3.5 1.2 3.5 2.8" />
  <!-- Middle canopy (Midgard) -->
  <path d="M12 9c-3 0-5 1.6-5 3.6" />
  <path d="M12 9c3 0 5 1.6 5 3.6" />
  <!-- Branches out -->
  <path d="M7 12.6c-1.2 0-2 .7-2 1.6" />
  <path d="M17 12.6c1.2 0 2 .7 2 1.6" />
  <!-- Roots (Niflheim) -->
  <path d="M12 18c-2.5 0-4 1.5-5 4" />
  <path d="M12 18c2.5 0 4 1.5 5 4" />
  <path d="M12 20c-1 0-1.5.7-2 2" />
  <path d="M12 20c1 0 1.5.7 2 2" />
</svg>
