title: Yggdrasil Infrastructure
views:
  - title: Mesh Network
    path: yggdrasil
    icon: mdi:server-network
    cards:
      # ══════════════════════════════════════════════
      #  Header
      # ══════════════════════════════════════════════
      - type: markdown
        content: |
          # Yggdrasil Mesh Network
          Real-time monitoring of the AI service mesh across Munin, Hugin, and Hades nodes.
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, rgba(30, 60, 30, 0.3), rgba(20, 20, 40, 0.5));
              border: 1px solid rgba(100, 200, 100, 0.2);
            }

      # ══════════════════════════════════════════════
      #  Service Health — all services in one card
      # ══════════════════════════════════════════════
      - type: entities
        title: Service Health
        show_header_toggle: false
        entities:
          - entity: sensor.ygg_odin_status
            name: Odin (LLM Gateway)
            icon: mdi:brain
          - entity: sensor.ygg_mimir_status
            name: Mimir (Memory)
            icon: mdi:database-search
          - entity: sensor.ygg_huginn_status
            name: Huginn (Orchestrator)
            icon: mdi:head-cog-outline
          - entity: sensor.ygg_muninn_status
            name: Muninn (Code Agent)
            icon: mdi:code-braces
          - entity: sensor.ygg_qdrant_status
            name: Qdrant (Vector DB)
            icon: mdi:vector-triangle
          - entity: sensor.ygg_node_munin
            name: Mesh Node Munin
            icon: mdi:server-network
          - entity: sensor.ygg_node_hugin
            name: Mesh Node Hugin
            icon: mdi:server-network
          - entity: sensor.ygg_sentinel_status
            name: Sentinel (Monitor)
            icon: mdi:shield-check

      # ══════════════════════════════════════════════
      #  Munin Node (MUNIN_IP)
      # ══════════════════════════════════════════════
      - type: entities
        title: "Munin  —  MUNIN_IP"
        show_header_toggle: false
        entities:
          - entity: sensor.ygg_odin_status
            name: Odin (LLM Gateway)
            icon: mdi:brain
          - entity: sensor.ygg_mimir_status
            name: Mimir (Memory)
            icon: mdi:database-search
          - entity: sensor.ygg_node_munin
            name: Mesh Node
            icon: mdi:server-network
          - entity: sensor.ygg_sentinel_status
            name: Sentinel
            icon: mdi:shield-check
          - entity: sensor.ygg_ollama_munin
            name: Ollama Models
            icon: mdi:robot
        card_mod:
          style: |
            ha-card {
              border-top: 2px solid rgba(100, 200, 100, 0.4);
            }

      # ══════════════════════════════════════════════
      #  Hugin Node (HUGIN_IP)
      # ══════════════════════════════════════════════
      - type: entities
        title: "Hugin  —  HUGIN_IP"
        show_header_toggle: false
        entities:
          - entity: sensor.ygg_huginn_status
            name: Huginn (Orchestrator)
            icon: mdi:head-cog-outline
          - entity: sensor.ygg_muninn_status
            name: Muninn (Code Agent)
            icon: mdi:code-braces
          - entity: sensor.ygg_node_hugin
            name: Mesh Node
            icon: mdi:server-network
          - entity: sensor.ygg_ollama_hugin
            name: Ollama Models
            icon: mdi:robot
        card_mod:
          style: |
            ha-card {
              border-top: 2px solid rgba(100, 150, 255, 0.4);
            }

      # ══════════════════════════════════════════════
      #  Hades Node (HADES_IP)
      # ══════════════════════════════════════════════
      - type: entities
        title: "Hades  —  HADES_IP"
        show_header_toggle: false
        entities:
          - entity: sensor.ygg_qdrant_status
            name: Qdrant (Vector DB)
            icon: mdi:vector-triangle
          - entity: sensor.ygg_qdrant_collections
            name: Qdrant Collections
            icon: mdi:database
        card_mod:
          style: |
            ha-card {
              border-top: 2px solid rgba(200, 100, 100, 0.4);
            }

      # ══════════════════════════════════════════════
      #  LLM Fleet
      # ══════════════════════════════════════════════
      - type: markdown
        content: >
          ## LLM Fleet

          **Munin Ollama:** {{ state_attr('sensor.ygg_ollama_munin', 'models')
          | default([], true)
          | map(attribute='name')
          | list
          | join(', ')
          | default('None loaded', true) }}

          **Hugin Ollama:** {{ state_attr('sensor.ygg_ollama_hugin', 'models')
          | default([], true)
          | map(attribute='name')
          | list
          | join(', ')
          | default('None loaded', true) }}
        card_mod:
          style: |
            ha-card {
              border-left: 3px solid rgba(100, 200, 255, 0.3);
            }

      # ══════════════════════════════════════════════
      #  Sentinel Monitor
      # ══════════════════════════════════════════════
      - type: entities
        title: "Sentinel  —  MUNIN_IP:9094"
        show_header_toggle: false
        entities:
          - entity: sensor.ygg_sentinel_status
            name: Sentinel Status
            icon: mdi:shield-check
        card_mod:
          style: |
            ha-card {
              border-top: 2px solid rgba(200, 180, 50, 0.4);
            }

      # ══════════════════════════════════════════════
      #  Network Topology
      # ══════════════════════════════════════════════
      - type: markdown
        content: |
          ## Network Topology
          | Node | IP | Services |
          |:-----|:---|:---------|
          | **Munin** | `MUNIN_IP` | Odin (:8080), Mimir (:9090), Node (:9100), Sentinel (:9094), Ollama (:11434) |
          | **Hugin** | `HUGIN_IP` | Huginn (:9092), Muninn (:9091), Node (:9100), Ollama (:11434) |
          | **Hades** | `HADES_IP` | Qdrant (:6333) |
        card_mod:
          style: |
            ha-card {
              background: rgba(30, 30, 50, 0.3);
              border: 1px solid rgba(100, 100, 200, 0.2);
            }
