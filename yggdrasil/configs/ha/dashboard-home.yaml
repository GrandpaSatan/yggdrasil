title: Home Control
views:
  - title: Home
    path: home
    icon: mdi:home
    type: sections
    cards:
      # ──────────────────────────────────────────────
      #  Person / Presence
      # ──────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Presence"
            card_mod:
              style: |
                ha-card { background: none; box-shadow: none; }
          - type: entity
            entity: person.jesus_hernandez
            name: Jesus Hernandez
          - type: entities
            entities:
              - entity: sensor.pixel_10_pro_fold_battery_level
                name: Phone Battery
                icon: mdi:battery
              - entity: sensor.pixel_10_pro_fold_battery_state
                name: Battery State
                icon: mdi:battery-charging
              - entity: sensor.pixel_10_pro_fold_charger_type
                name: Charger Type
                icon: mdi:power-plug

      # ──────────────────────────────────────────────
      #  Living Room
      # ──────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Living Room"
            card_mod:
              style: |
                ha-card { background: none; box-shadow: none; }
          - type: thermostat
            entity: climate.living_room
            name: Nest Thermostat
          - type: entities
            entities:
              - entity: sensor.living_room_temperature
                name: Temperature
                icon: mdi:thermometer
              - entity: sensor.living_room_humidity
                name: Humidity
                icon: mdi:water-percent

      # ──────────────────────────────────────────────
      #  Kitchen
      # ──────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Kitchen"
            card_mod:
              style: |
                ha-card { background: none; box-shadow: none; }
          - type: light
            entity: light.kitchen_00
            name: Kitchen Light 1
          - type: light
            entity: light.kitchen_01
            name: Kitchen Light 2
          # UNAVAILABLE: light.kitchen_02
          # UNAVAILABLE: light.kitchen_03
          - type: entities
            entities:
              - entity: sensor.kitchen_00_current_consumption
                name: Kitchen Light 1 Power
                icon: mdi:flash
              - entity: sensor.kitchen_01_current_consumption
                name: Kitchen Light 2 Power
                icon: mdi:flash

      # ──────────────────────────────────────────────
      #  Dining Room
      # ──────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Dining Room"
            card_mod:
              style: |
                ha-card { background: none; box-shadow: none; }
          - type: entities
            entities:
              - entity: switch.dinning_light
                name: Dining Light
                icon: mdi:ceiling-light

      # ──────────────────────────────────────────────
      #  Game Room
      # ──────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Game Room"
            card_mod:
              style: |
                ha-card { background: none; box-shadow: none; }
          - type: entities
            entities:
              - entity: switch.m_game_light
                name: Game Room Light
                icon: mdi:ceiling-light
          - type: light
            entity: light.sr_tv
            name: Game Room TV Light

      # ──────────────────────────────────────────────
      #  Second Living Room
      # ──────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Second Living Room"
            card_mod:
              style: |
                ha-card { background: none; box-shadow: none; }
          - type: light
            entity: light.living_tv
            name: Living TV Light
          - type: light
            entity: light.lv_ceiling
            name: Ceiling Light

      # ──────────────────────────────────────────────
      #  Security
      # ──────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Security"
            card_mod:
              style: |
                ha-card { background: none; box-shadow: none; }
          # UNAVAILABLE: lock.front_door
          # UNAVAILABLE: lock.basement_door
          # UNAVAILABLE: lock.back_door
          # UNAVAILABLE: sensor.back_door_lock_battery
          - type: entities
            title: Front Door Camera
            show_header_toggle: false
            entities:
              - entity: switch.front_door_cam_power
                name: Power
                icon: mdi:cctv
              - entity: switch.front_door_cam_notifications
                name: Notifications
                icon: mdi:bell
              - entity: switch.front_door_cam_motion_detection
                name: Motion Detection
                icon: mdi:motion-sensor
          - type: entities
            title: Garage Camera
            show_header_toggle: false
            entities:
              - entity: switch.garage_cam_power
                name: Power
                icon: mdi:cctv
              - entity: switch.garage_cam_notifications
                name: Notifications
                icon: mdi:bell
              - entity: switch.garage_cam_motion_detection
                name: Motion Detection
                icon: mdi:motion-sensor
          # UNAVAILABLE: Pet Cam (switch.pet_cam_power, switch.pet_cam_notifications, switch.pet_cam_motion_detection)
          # UNAVAILABLE: Driveway Cam (switch.driveway_power, switch.driveway_notifications, switch.driveway_motion_detection)
          # UNAVAILABLE: Yard Cam (switch.yard_power, switch.yard_notifications, switch.yard_motion_detection)

      # ──────────────────────────────────────────────
      #  Power
      # ──────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Power"
            card_mod:
              style: |
                ha-card { background: none; box-shadow: none; }
          - type: entities
            title: TP-Link Power Strip
            show_header_toggle: true
            entities:
              - entity: switch.tp_link_power_strip_2f59
                name: Main Strip
                icon: mdi:power-socket-us
              - entity: switch.tp_link_power_strip_2f59_plug_1
                name: Plug 1
                icon: mdi:power-plug
              - entity: switch.tp_link_power_strip_2f59_plug_2
                name: Plug 2
                icon: mdi:power-plug
              - entity: switch.tp_link_power_strip_2f59_plug_3
                name: Plug 3
                icon: mdi:power-plug

      # ──────────────────────────────────────────────
      #  Automations
      # ──────────────────────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Automations"
            card_mod:
              style: |
                ha-card { background: none; box-shadow: none; }
          - type: entities
            entities:
              - entity: automation.awaken_krakens_2
                name: Awaken Krakens
                icon: mdi:alarm
              - entity: automation.nap_krakens
                name: Nap Krakens
                icon: mdi:sleep
              - entity: automation.summeroutcold
                name: Summer Out Cold
                icon: mdi:snowflake

      # ──────────────────────────────────────────────
      #  Unavailable / Offline Entities (Reference)
      # ──────────────────────────────────────────────
      # Hallway:
      #   - light.smart_rgbtw_bulb_5
      # Laundry:
      #   - lock.basement_door
      #   - light.smart_rgbtw_bulb_4
      # Back Porch:
      #   - lock.back_door
      #   - sensor.back_door_lock_battery
      # Front Door:
      #   - lock.front_door
      # Living Room:
      #   - switch.pet_cam_power / notifications / motion_detection
      # Driveway:
      #   - switch.driveway_power / notifications / motion_detection
      #   - switch.yard_power / notifications / motion_detection
      # Media Players (all unavailable):
      #   - media_player.game_room_tv
      #   - media_player.living_room_tv
      #   - media_player.living_room_speaker
