node_name: "odin"
listen_addr: "0.0.0.0:8080"

backends:
  - name: "munin"
    url: "http://localhost:11434"
    backend_type: "ollama"
    models:
      - "qwen3-coder:30b-a3b-q4_K_M"
      - "qwen3-embedding"
    max_concurrent: 2
  - name: "hugin"
    url: "http://REDACTED_HUGIN_IP:11434"
    backend_type: "ollama"
    models:
      - "qwen3:30b-a3b"
      - "qwen3-embedding"
    max_concurrent: 2

routing:
  default_model: "qwen3-coder:30b-a3b-q4_K_M"
  rules:
    - intent: "coding"
      model: "qwen3-coder:30b-a3b-q4_K_M"
      backend: "munin"
    - intent: "reasoning"
      model: "qwen3:30b-a3b"
      backend: "hugin"
    - intent: "home_automation"
      model: "qwen3:30b-a3b"
      backend: "hugin"

mimir:
  url: "http://localhost:9090"
  query_limit: 3
  store_on_completion: true

muninn:
  url: "http://REDACTED_HUGIN_IP:9091"
  max_context_chunks: 10

session:
  max_sessions: 256
  session_ttl_secs: 3600
  context_budget_tokens: 14000
  generation_reserve: 2048

ha:
  url: "http://REDACTED_CHIRP_IP:8123"
  token: "${HA_TOKEN}"
  timeout_secs: 10
