<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Earth Globe - Three.js r128</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000010;
            overflow: hidden;
            color: #fff;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 30, 0.8);
            border: 1px solid rgba(100, 150, 255, 0.3);
            padding: 15px 25px;
            border-radius: 8px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .ui-overlay h2 {
            font-size: 14px;
            color: #6496ff;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .controls-info {
            font-size: 11px;
            color: #aaa;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 20, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(100, 150, 255, 0.3);
            border-top-color: #6496ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            margin-top: 20px;
            color: #6496ff;
            font-family: monospace;
            text-align: center;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loading-text">Loading resources...</div>
    </div>
    
    <div class="ui-overlay">
        <h2>Earth Globe Viewer</h2>
        <div class="controls-info">
            ⧉ Drag to rotate | 🖱️ Scroll to zoom | Auto-rotate enabled
        </div>
    </div>

    <!-- Three.js r128 from CDN as requested -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- OrbitControls implementation (not included in r128) -->
    <script>
        // OrbitControls for Three.js r128
        function OrbitControls( object, domElement ) {
            var origin = new THREE.Vector3();
            
            this.object = object;
            this.domElement = domElement;
            
            // Settings
            this.enabled = true;
            this.enableDamping = false;
            this.dampingFactor = 0.05;
            this.minDistance = 2.5;
            this.maxDistance = 15;
            this.minPolarAngle = Math.PI / 4; // -45 degrees
            this.maxPolarAngle = Math.PI * 0.75; // +135 degrees
            
            var scope = this;
            
            var EPSILON = 0.000001;
            var phi = Math.PI / 2;
            var theta = Math.PI / 4;
            var omegaStart = theta;
            var phiStart = phi;
            var psiStart = 0;
            
            var moveStart = null;
            var moveEnd = null;
            var moveDistance = new THREE.Vector3();
            var sphericalDelta = new THREE.Vector3();
            var sphericalDeltaLength = 0;
            var sphericalVelocity = new THREE.Vector3();
            var sphericalSpeed = 1;
            var moveStartX = null;
            var moveStartY = null;
            
            // Private methods
            function getMousePosition( event ) {
                var rect = domElement.getBoundingClientRect(),
                    width = rect.width,
                    height = rect.height;
                
                var x = ( event.clientX || event.touches[0].clientX ) - rect.left;
                var y = ( event.clientY || event.touches[0].clientY ) - rect.top;
                
                return new THREE.Vector2( x / width * 2 - 1, - ( y / height * 2 - 1 ) );
            }
            
            function getQuaternionFromAxisAngle( axis, angle ) {
                var halfAngle = angle / 2,
                    s = Math.sin( halfAngle );
                
                return new THREE.Quaternion( 
                    1, 0, 0, 0,
                    0, Math.cos( halfAngle ), -s, 0,
                    0, s, Math.cos( halfAngle ), 0,
                    0, 0, 0, Math.cos( halfAngle )
                );
            }
            
            function setQuaternionFromSpherical( theta, phi, psi ) {
                var quaternion = getQuaternionFromAxisAngle( new THREE.Vector3( 1, 0, 0 ), psi ),
                    q2 = getQuaternionFromAxisAngle( new THREE.Vector3( 0, 1, 0 ), phi ),
                    q3 = getQuaternionFromAxisAngle( new THREE.Vector3( 0, 0, 1 ), theta );
                
                scope.object.quaternion.copy( quaternion.multiply( q2 ).multiply( q3 ) );
            }
            
            function update() {
                var event = domElement.mouseEvents || domElement.touchEvents;
                
                if ( moveStart === null && event.length > 0 ) {
                    moveStartX = event[ 0 ].pageX;
                    moveStartY = event[ 0 ].pageY;
                } else if ( moveStart !== null && event.length > 0 ) {
                    var moveEndX = event[ event.length - 1 ].pageX,
                        moveEndY = event[ event.length - 1 ].pageY;
                    
                    moveDistance.x = moveEndX - moveStartX;
                    moveDistance.y = moveEndY - moveStartY;
                    sphericalDelta.x = moveDistance.x / scope.object.scale.x * Math.PI / width;
                    sphericalDelta.y = moveDistance.y / scope.object.scale.y * Math.PI / height;
                    
                    var deltaTheta = sphericalDelta.x,
                        deltaPhi = sphericalDelta.y,
                        sinPhi = Math.sin( phi );
                    
                    theta -= deltaTheta - sinPhi * deltaTheta * deltaPhi;
                    phi -= deltaPhi;
                    
                    if ( phi < scope.minPolarAngle ) {
                        phi = scope.minPolarAngle;
                        theta += sinPhi * deltaPhi / sin( scope.minPolarAngle );
                    } else if ( phi > scope.maxPolarAngle ) {
                        phi = scope.maxPolarAngle;
                        theta -= sinPhi * deltaPhi / sin( scope.maxPolarAngle );
                    }
                    
                    sphericalDeltaLength = Math.sqrt( 
                        sphericalDelta.x * sphericalDelta.x + 
                        sphericalDelta.y * sphericalDelta.y
                    );
                    
                    if ( moveDistance.length() > EPSILON ) {
                        if ( !scope.enableDamping ) {
                            setQuaternionFromSpherical( theta, phi, psiStart );
                            
                            moveStartX = null;
                            moveStartY = null;
                        } else {
                            sphericalVelocity.x -= sphericalDelta.x * scope.dampingFactor;
                            sphericalVelocity.y -= sphericalDelta.y * scope.dampingFactor;
                            
                            theta += sphericalVelocity.x;
                            phi += sphericalVelocity.y;
                            
                            if ( Math.abs( sphericalVelocity.length() ) < EPSILON ) {
                                moveStartX = null;
                                moveStartY = null;
                            }
                        }
                        
                        if ( phi < scope.minPolarAngle ) {
                            phi = scope.minPolarAngle;
                            theta += sinPhi * sphericalDelta.y / sin( scope.minPolarAngle );
                        } else if ( phi > scope.maxPolarAngle ) {
                            phi = scope.maxPolarAngle;
                            theta -= sinPhi * sphericalDelta.y / sin( scope.maxPolarAngle );
                        }
                        
                        setQuaternionFromSpherical( theta, phi, psiStart );
                    }
                }
                
                if ( scope.enableDamping ) {
                    if ( Math.abs( sphericalVelocity.x ) < EPSILON && 
                         Math.abs( sphericalVelocity.y ) < EPSILON ) {
                        moveStartX = null;
                        moveStartY = null;
                    }
                    
                    sphericalVelocity.x *= ( 1 - scope.dampingFactor );
                    sphericalVelocity.y *= ( 1 - scope.dampingFactor );
                }
            }
            
            function reset() {
                theta = omegaStart;
                phi = phiStart;
                psi = psiStart;
                setQuaternionFromSpherical( theta, phi, psi );
            }
            
            // Public methods
            this.enabled = scope.enabled;
            this.enableDamping = scope.enableDamping;
            this.minDistance = scope.minDistance;
            this.maxDistance = scope.maxDistance;
            this.minPolarAngle = scope.minPolarAngle;
            this.maxPolarAngle = scope.maxPolarAngle;
            
            this.update = update;
            this.reset = reset;
        }
    </script>

    <script>
        // ==================== SYSTEM ARCHITECT DECISIONS ====================
        // Memory engram: Architecture v1.0 - Earth Globe Viewer
        // Cause: User requested rotating 3D Earth globe using Three.js r128
        // Effect: Implemented standalone HTML5 WebGL application with manual OrbitControls
        // Tags: ["threejs", "webgl", "earth-globe", "orbit-controls"]
        
        // ==================== MAIN APPLICATION ====================
        
        (function() {
            'use strict';
            
            // Configuration constants
            const CONFIG = {
                earthRadius: 2,
                textureUrl: 'https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg',
                starCount: 5000,
                autoRotateSpeed: 0.001,
                minZoom: 1,
                maxZoom: 10
            };
            
            // Initialize Three.js scene
            function init() {
                const container = document.getElementById('canvas-container');
                
                // Scene setup
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x050510);
                
                // Camera setup - FOV 60, near 0.1, far 100
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 
                    CONFIG.minZoom * CONFIG.earthRadius, CONFIG.maxZoom * CONFIG.earthRadius);
                
                // Renderer setup
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);
                
                // Add OrbitControls (manual implementation for r128)
                const controls = new OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.minDistance = CONFIG.minZoom * CONFIG.earthRadius;
                controls.maxDistance = CONFIG.maxZoom * CONFIG.earthRadius;
                
                // ==================== EARTH GLOBE ====================
                
                const earthGroup = new THREE.Group();
                scene.add(earthGroup);
                
                // Earth mesh with texture
                const geometry = new THREE.SphereGeometry(CONFIG.earthRadius, 64, 32);
                const material = new THREE.MeshPhongMaterial({
                    map: null,
                    specular: new THREE.Color(0x333333),
                    shininess: 5,
                    emissive: new THREE.Color(0x111111)
                });
                
                const earthMesh = new THREE.Mesh(geometry, material);
                earthGroup.add(earthMesh);
                
                // ==================== STARFIELD BACKGROUND ====================
                
                function createStarfield() {
                    const starGeometry = new THREE.BufferGeometry();
                    const starCount = CONFIG.starCount;
                    const positions = new Float32Array(starCount * 3);
                    
                    for (let i = 0; i < starCount; i++) {
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        
                        const radius = CONFIG.maxZoom * CONFIG.earthRadius + 
                            (Math.random() * CONFIG.minZoom - CONFIG.minZoom / 2) * CONFIG.earthRadius;
                        
                        positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                        positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                        positions[i * 3 + 2] = radius * Math.cos(phi);
                    }
                    
                    starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    
                    const starMaterial = new THREE.PointsMaterial({
                        color: 0x88aaff,
                        size: 0.15,
                        transparent: true,
                        opacity: 0.8,
                        blending: THREE.AdditiveBlending
                    });
                    
                    return new THREE.Points(starGeometry, starMaterial);
                }
                
                const starfield = createStarfield();
                scene.add(starfield);
                
                // ==================== LIGHTING ====================
                
                const ambientLight = new THREE.AmbientLight(0x404080, 0.3);
                scene.add(ambientLight);
                
                const sunLight = new THREE.DirectionalLight(0xffffff, 1);
                sunLight.position.set(5, 3, 5);
                sunLight.castShadow = true;
                scene.add(sunLight);
                
                // ==================== TEXTURE LOADING ====================
                
                function loadTexture() {
                    const textureLoader = new THREE.TextureLoader();
                    
                    document.getElementById('loading-text').textContent = 
                        'Loading Earth texture...';
                    
                    textureLoader.load(
                        CONFIG.textureUrl,
                        function(texture) {
                            material.map = texture;
                            material.needsUpdate = true;
                            document.getElementById('loading').style.display = 'none';
                            
                            // Initial position - show North Pole slightly tilted
                            earthGroup.rotation.x = Math.PI / 2.5;
                            
                            console.log('Earth globe initialized successfully');
                        },
                        null,
                        function(err) {
                            document.getElementById('loading-text').textContent = 
                                'Error loading texture: ' + err.message;
                            console.error('Texture load failed:', err);
                            
                            // Fallback to procedural coloring
                            material.color.setHex(0x2d5a27);
                            material.needsUpdate = true;
                            document.getElementById('loading').style.display = 'none';
                        }
                    );
                }
                
                loadTexture();
            }
            
            // ==================== ANIMATION LOOP ====================
            
            function animate() {
                requestAnimationFrame(animate);
                
                const time = Date.now() * CONFIG.autoRotateSpeed;
                
                // Auto-rotation (slower than manual controls)
                earthGroup.rotation.y += 0.0015;
                
                // Subtle breathing animation for realism
                const breathFactor = Math.sin(time * 0.5) * 0.02;
                earthMesh.scale.setScalar(1 + breathFactor);
                
                controls.update();
                renderer.render(scene, camera);
            }
            
            // ==================== RESIZE HANDLER ====================
            
            function onResize() {
                const width = window.innerWidth;
                const height = window.innerHeight;
                
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                
                renderer.setSize(width, height);
                controls.update();
            }
            
            window.addEventListener('resize', onResize);
            
            // ==================== INITIALIZATION ====================
            
            init();
            animate();
        })();
    </script>
</body>
</html>
