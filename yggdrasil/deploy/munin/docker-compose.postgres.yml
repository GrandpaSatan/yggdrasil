services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yggdrasil-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: yggdrasil
      POSTGRES_USER: yggdrasil
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yggdrasil}
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yggdrasil -d yggdrasil"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
