      -p 8002:8000
      rocm/vllm-dev:main-gfx1150-gfx1200
      vllm serve zai-org/GLM-4-7B-Flash-AWQ
      --served-model-name glm-4.7-flash:latest
      --quantization awq_marlin
      --gpu-memory-utilization 0.90
      --port 8000
    proxy: "http://127.0.0.1:8002"
    ttl: 900

