# llama-swap config — Sprint 065 Track B (all-vLLM migration)
#
# llama-swap fronts vLLM on Hugin. On each /v1/chat/completions call it spawns
# (or reuses) the vLLM process configured for the requested `model` id, proxies
# the request, and unloads the process after `ttl`.
#
# Keeps ONE static model fleet definition: caller model names remain the same
# as their Ollama counterparts so Odin config.json cutover is a URL change,
# NOT a model-name rename.
#
# Repo: github.com/mostlygeek/llama-swap  (docs at /wiki)

healthCheckTimeout: 900            # 15 min cold load ceiling for large AWQ models
startPort: 8001                    # vLLM instances bind from 8001 upwards
listen: 0.0.0.0:11500              # llama-swap's own OpenAI-compat port

logLevel: info
# Persist swap events for diagnostics.
eventsFile: /var/log/llama-swap/events.jsonl

models:
  # ── Primary reasoning (Sprint 053+ routing rules) ────────────────────
  "gemma4:e4b":
    cmd: >-
      docker run --rm --device /dev/kfd --device /dev/dri/renderD128
      -e HIP_VISIBLE_DEVICES=0 -e HSA_OVERRIDE_GFX_VERSION=12.0.0
      -v /opt/yggdrasil/models:/models:ro
      -p 8001:8000
      rocm/vllm-dev:main-gfx1150-gfx1200
      vllm serve /models/gemma4-e4b.gguf
      --served-model-name gemma4:e4b
      --quantization gguf
      --max-model-len 32768
      --gpu-memory-utilization 0.85
      --port 8000
    proxy: "http://127.0.0.1:8001"
    ttl: 600

  "glm-4.7-flash:latest":
    cmd: >-
      docker run --rm --device /dev/kfd --device /dev/dri/renderD128
      -e HIP_VISIBLE_DEVICES=0 -e HSA_OVERRIDE_GFX_VERSION=12.0.0
