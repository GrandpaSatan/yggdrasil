# llama-swap config — Sprint 069 Phase F cutover
#
# llama-swap fronts vLLM on Hugin. On each /v1/chat/completions call it spawns
# (or reuses) the vLLM process configured for the requested `model` id, proxies
# the request, and unloads the process after `ttl`.
#
# Caller model names remain identical to their Ollama counterparts — Odin
# config.json cutover is a URL change only, never a model-name rename.
#
# vLLM image (verified on rocm.docs.amd.com, Apr 2026):
#   rocm/vllm-dev:rocm7.2.1_navi_ubuntu24.04_py3.12_pytorch_2.9_vllm_0.16.0
#   Official AMD-published build; targets gfx1150/gfx1151 (Hugin 890M iGPU).
#
# GPU routing:
#   HIP_VISIBLE_DEVICES=0 → 890M iGPU (gfx1150)  — small/medium models, ttl<600
#   HIP_VISIBLE_DEVICES=1 → RX 9060 XT eGPU (gfx1200, RDNA 4) — large models
#     HSA_OVERRIDE_GFX_VERSION=12.0.0 forces the runtime to accept gfx1200
#     despite the image only advertising gfx1150/gfx1151; validated with the
#     Sprint 069 Phase F smoke test.
#
# Soak port: :11440 during the 24h dual-serve validation; flipped to :11434
# at cutover (after Ollama on Hugin is systemctl disabled).

healthCheckTimeout: 900            # 15 min cold load ceiling for large AWQ models
startPort: 8001                    # vLLM instances bind from 8001 upwards
listen: 0.0.0.0:11440              # soak port; moves to :11434 post-cutover

logLevel: info
eventsFile: /var/log/llama-swap/events.jsonl

# Shared docker run preamble for the Navi vLLM image.
# Docker bind-mount `/opt/yggdrasil/models` is read-only — production
# store changes happen via `scripts/ops/stage-vllm-models.sh` on the host.
models:
  # ── Primary reasoning (gfx1150 iGPU) ──────────────────────────────────
  "gemma4:e4b":
    cmd: >-
      docker run --rm --device /dev/kfd --device /dev/dri
      -e HIP_VISIBLE_DEVICES=0 -e HSA_OVERRIDE_GFX_VERSION=11.5.0
      -e VLLM_USE_TRITON_FLASH_ATTN=0
      -v /opt/yggdrasil/models:/models:ro
      -p 8001:8000
      rocm/vllm-dev:rocm7.2.1_navi_ubuntu24.04_py3.12_pytorch_2.9_vllm_0.16.0
      vllm serve /models/gemma4-e4b.gguf
      --served-model-name gemma4:e4b
      --quantization gguf
      --max-model-len 32768
      --gpu-memory-utilization 0.85
      --port 8000
    proxy: "http://127.0.0.1:8001"
    ttl: 600

  "gemma4:e2b":
    cmd: >-
      docker run --rm --device /dev/kfd --device /dev/dri
      -e HIP_VISIBLE_DEVICES=0 -e HSA_OVERRIDE_GFX_VERSION=11.5.0
